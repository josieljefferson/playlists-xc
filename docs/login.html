<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📺 IPTV Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .container {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 2rem;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    h1 { text-align: center; margin-bottom: 1.5rem; font-size: 1.8rem; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
    input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 1rem;
    }
    input:focus { outline: none; border-color: #4facfe; }
    button {
      width: 100%;
      padding: 0.75rem;
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      border: none;
      border-radius: 8px;
      color: #1a1a2e;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s;    }
    button:hover { transform: translateY(-2px); }
    .switch { text-align: center; margin-top: 1rem; }
    .switch a { color: #4facfe; text-decoration: none; }
    .error { color: #ff6b6b; margin: 0.5rem 0; font-size: 0.9rem; }
    .success { color: #00d2a0; margin: 0.5rem 0; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📺 IPTV Access</h1>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Usuário</label>
        <input type="text" id="username" required minlength="3" placeholder="Seu usuário">
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" required minlength="6" placeholder="Sua senha">
      </div>
      <div id="message"></div>
      <button type="submit">🔐 Entrar</button>
    </form>
    <div class="switch">
      Não tem conta? <a href="register.html">Cadastre-se</a>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('message');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      
      msg.textContent = '⏳ Entrando...';
      msg.className = '';
      
      try {
        const res = await fetch(`${API_BASE}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        
        if (data.success) {
          localStorage.setItem('iptv_token', data.token);          localStorage.setItem('iptv_user', data.username);
          msg.textContent = '✅ Login realizado! Redirecionando...';
          msg.className = 'success';
          setTimeout(() => window.location.href = 'index.html', 1500);
        } else {
          msg.textContent = `❌ ${data.message}`;
          msg.className = 'error';
        }
      } catch (err) {
        msg.textContent = '❌ Erro de conexão';
        msg.className = 'error';
      }
    });
  </script>
</body>
</html>
