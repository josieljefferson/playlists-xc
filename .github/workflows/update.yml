name: IPTV Auto Update

on:
  schedule:
    - cron: "0 */6 * * *"  # A cada 6 horas
  workflow_dispatch:      # Execução manual
  push:
    branches: [main]
    paths:
      - "*.m3u"
      - "*.m3u8"
      - "script_update.py"

permissions:
  contents: write
  actions: read

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    # ✅ Cache para dependências
    env:
      PIP_CACHE_DIR: ~/.cache/pip
    
    steps:
      - name: 📦 Clonar repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"  # ✅ Cache automático do pip

      - name: ⬇️ Restaurar cache de downloads
        uses: actions/cache@v4
        with:
          path: downloads/
          key: ${{ runner.os }}-m3u-${{ hashFiles('**/*.m3u') }}
          restore-keys: |
            ${{ runner.os }}-m3u-

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔄 Rodar script de atualização
        run: python script_update.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Adicionar timestamp na playlist
        run: |
          FILE="docs/playlists.m3u"
          if [ -f "$FILE" ]; then
            # Remove timestamp antigo se existir
            sed -i '/# 🔄 Atualizado em/d' "$FILE"
            # Adiciona novo timestamp
            echo -e "\n# 🔄 Atualizado em $(TZ='America/Fortaleza' date '+%d/%m/%Y - %H:%M:%S') BRT" >> "$FILE"
          fi

      - name: 🔍 Verificar mudanças antes de commit
        id: git-check
        run: |
          git add .
          if git diff --staged --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "✅ Sem alterações para commit"
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "✅ Alterações detectadas"
          fi

      - name: 💾 Commit automático (apenas se houver mudanças)
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --global user.name "iptv-bot"
          git config --global user.email "bot@playlists-xc.ondigitalocean.app"
          git commit -m "🔄 update: playlists $(date '+%Y-%m-%d %H:%M') BRT [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Trigger deploy no Render (opcional)
        if: steps.git-check.outputs.changes == 'true'
        run: |
          curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": true}'
        continue-on-error: true