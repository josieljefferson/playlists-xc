name: IPTV Auto Update

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "*.m3u"
      - "*.m3u8"
      - "*.py"
      - "requirements.txt"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    env:
      PIP_CACHE_DIR: ~/.cache/pip
      PYTHONPATH: ${{ github.workspace }}
    
    steps:
      - name: 📦 Clonar repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 🔍 Verificar estrutura
        run: |
          echo "📁 Conteúdo do repositório:"
          ls -la
          echo "📁 Arquivos Python:"
          ls -la *.py 2>/dev/null || echo "Nenhum .py na raiz"

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔄 Rodar script de atualização
        run: python script_update.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Adicionar timestamp
        run: |
          FILE="docs/playlists.m3u"
          if [ -f "$FILE" ]; then
            sed -i '/# 🔄 Atualizado em/d' "$FILE"
            echo "" >> "$FILE"
            echo "# 🔄 Atualizado em $(TZ='America/Fortaleza' date '+%d/%m/%Y - %H:%M:%S') BRT" >> "$FILE"
          fi

      - name: 🔍 Verificar mudanças
        id: git-check
        run: |
          git add .
          if git diff --staged --quiet --exit-code; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "✅ Sem alterações"
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "✅ Alterações detectadas"
          fi

      - name: 💾 Commit automático
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --global user.name "iptv-bot"
          git config --global user.email "bot@iptv-system.app"
          git commit -m "🔄 update: playlists $(date '+%Y-%m-%d %H:%M') BRT [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}