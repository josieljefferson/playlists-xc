name: IPTV Auto Update

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "*.m3u"
      - "*.m3u8"
      - "*.py"
      - "requirements.txt"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📦 Clonar repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 🧪 Validar sintaxe Python
        run: python -m py_compile m3u_processor.py script_update.py

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 🔄 Rodar script
        run: python script_update.py

      - name: 📝 Ajustar timestamp
        run: |
          FILE="docs/playlists.m3u"
          if [ -f "$FILE" ]; then
            sed -i '/# 🔄 Atualizado em/d' "$FILE"
            echo "" >> "$FILE"
            echo "# 🔄 Atualizado em $(TZ='America/Fortaleza' date '+%d/%m/%Y - %H:%M:%S') BRT" >> "$FILE"
          fi

      - name: 🔍 Verificar mudanças
        id: git-check
        run: |
          git add .
          if git diff --staged --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: 💾 Commit automático
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --global user.name "iptv-bot"
          git config --global user.email "bot@iptv-system.app"
          git commit -m "🔄 update: playlists $(date '+%Y-%m-%d %H:%M') BRT"
          git push
